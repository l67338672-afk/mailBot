<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MailBot</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
    .box { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    button { padding: 10px 15px; cursor: pointer; }
  </style>
</head>
<body>

<h1>MailBot</h1>

<div class="box">
  <h3>Customers</h3>
  <div id="customers"></div>
</div>

<div class="box">
  <h3>Templates</h3>
  <select id="templateSelect"></select>
</div>

<div class="box">
  <h3>Broadcast</h3>
  <button onclick="sendBroadcast()">Send to Selected</button>
</div>

<script>
let customers = [];
let templates = [];

// LOAD CUSTOMERS
async function loadCustomers() {
  const res = await fetch("/api/customers");
  const data = await res.json();
  customers = data;

  const div = document.getElementById("customers");
  div.innerHTML = "";

  customers.forEach(c => {
    div.innerHTML += `
      <label>
        <input type="checkbox" value="${c.id}" />
        ${c.name} (${c.email})
      </label><br/>
    `;
  });
}

// LOAD TEMPLATES
async function loadTemplates() {
  const res = await fetch("/api/templates");
  const data = await res.json();
  templates = data;

  const select = document.getElementById("templateSelect");
  select.innerHTML = "";

  templates.forEach(t => {
    select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
  });
}

// SEND BROADCAST
async function sendBroadcast() {
  const selectedTemplate = document.getElementById("templateSelect").value;

  const selectedCustomers = [...document.querySelectorAll("input[type=checkbox]:checked")]
    .map(cb => Number(cb.value));

  console.log("🚀 Sending request...");
  console.log("Template:", selectedTemplate);
  console.log("Customers:", selectedCustomers);

  try {
    const res = await fetch("/api/broadcast", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        templateId: selectedTemplate,
        customerIds: selectedCustomers
      })
    });

    const data = await res.json();

    console.log("✅ Response:", data);
    alert(JSON.stringify(data, null, 2));

  } catch (err) {
    console.error("❌ ERROR:", err);
    alert("Request failed: " + err.message);
  }
}

// INIT
loadCustomers();
loadTemplates();
</script>

</body>
</html>
