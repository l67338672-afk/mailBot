<!DOCTYPE html>
<html>
<head>
  <title>MailBot</title>
</head>
<body>
  <h1>MailBot</h1>

  <h2>Customers</h2>
  <ul id="customers"></ul>

  <h2>Templates</h2>
  <select id="templates"></select>

  <h2>Broadcast</h2>
  <button onclick="send()">Send to All</button>

  <script>
    async function load() {
      const customers = await fetch("/api/customers").then(r => r.json());
      const templates = await fetch("/api/templates").then(r => r.json());

      document.getElementById("customers").innerHTML =
        customers.map(c => `<li>${c.name} (${c.email})</li>`).join("");

      document.getElementById("templates").innerHTML =
        templates.map(t => `<option value="${t.id}">${t.name}</option>`).join("");
    }

    async function send() {
      const templateId = document.getElementById("templates").value;

      const res = await fetch("/api/broadcast", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ templateId })
      });

      const data = await res.json();
      alert("Sent: " + data.total);
    }

    load();
  </script>
</body>
</html>
